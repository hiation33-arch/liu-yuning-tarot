<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap');

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#F0F1F6;margin:0;padding:0;overscroll-behavior:none;color:#1A1A2E}

.app{max-width:390px;margin:0 auto;min-height:100dvh;position:relative;background:#F0F1F6;overflow:hidden}
.scroll-area{height:calc(100dvh - 56px - 64px);overflow-y:auto;padding-bottom:32px;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}

/* Animations */
.spin{animation:spin .9s linear infinite}
.pulse-fade{animation:pf 1.4s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pf{0%,100%{opacity:1}50%{opacity:.3}}

.overlay-bg{animation:fadeIn .2s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.sheet{animation:sheetUp .32s cubic-bezier(0.34,1.06,0.64,1) both}
@keyframes sheetUp{from{transform:translateY(100%);opacity:.6}to{transform:translateY(0);opacity:1}}

.fade-in{animation:fadeIn .2s ease both}

/* Cards */
.card{background:#fff;border-radius:20px;padding:20px}
.shadow-card{box-shadow:0 2px 20px rgba(26,26,46,.06)}

/* Buttons */
button{font-family:'Noto Sans KR',sans-serif;transition:transform .12s cubic-bezier(.4,0,.2,1),box-shadow .12s,background .15s,border-color .15s,color .15s;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(.95)}

/* Input focus */
input:focus{border-color:#6C5CE7!important;outline:none;box-shadow:0 0 0 3px rgba(108,92,231,.14)!important}
input{transition:border-color .15s,box-shadow .15s}

/* Numbers — tabular */
.num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1;letter-spacing:-.02em}

/* Tab icon active color */
.tab-ic-on path,.tab-ic-on circle,.tab-ic-on line,.tab-ic-on polyline,.tab-ic-on rect{stroke:#6C5CE7;transition:stroke .15s}
.tab-ic-off path,.tab-ic-off circle,.tab-ic-off line,.tab-ic-off polyline,.tab-ic-off rect{stroke:#9898B0;transition:stroke .15s}

/* Toast */
.toast{animation:toastIn .25s cubic-bezier(.34,1.06,.64,1) both,toastOut .2s ease .3s both forwards}
.toast-persist{animation:toastIn .25s cubic-bezier(.34,1.06,.64,1) both}
@keyframes toastIn{from{transform:translateY(8px) scale(.96);opacity:0}to{transform:none;opacity:1}}
@keyframes toastOut{to{opacity:0;transform:translateY(-6px) scale(.97)}}

/* Hover (non-touch only) */
@media(hover:hover){
  button:hover{filter:brightness(.97)}
}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
  button:active{transform:none!important}
}
</style>

/* ─── CLAUDE API ─── */
async function analyzePortfolio(assets, apiKey) {
  const list = assets.map(a=>`${a.name}(${a.symbol},${a.type})`).join(', ');
  const prompt = `당신은 세계 최고의 금융 자문가입니다. 보유 자산: ${list}
분석하고 아래 형식의 JSON만 응답하세요 (다른 텍스트 없이):
{
  "action": "HOLD 또는 TAKE_PROFIT 또는 CUT_LOSS 또는 BUY_MORE 중 하나",
  "reasoning": "포트폴리오 전반 리스크·기회 평가 (한국어)",
  "holdReasoning": "홀딩 근거 (한국어)",
  "sellReasoning": "매도 근거 (한국어)",
  "riskAssessment": "리스크 평가 요약 (한국어)",
  "potentialGrowth": 0.0,
  "topNews": [
    {"title":"뉴스 제목","summary":"요약","impactScore":0,"url":"https://example.com"},
    {"title":"뉴스 제목","summary":"요약","impactScore":0,"url":"https://example.com"},
    {"title":"뉴스 제목","summary":"요약","impactScore":0,"url":"https://example.com"},
    {"title":"뉴스 제목","summary":"요약","impactScore":0,"url":"https://example.com"},
    {"title":"뉴스 제목","summary":"요약","impactScore":0,"url":"https://example.com"}
  ]
}
topNews는 이 자산들에 직접 영향을 주는 최근 주요 경제·시장 뉴스 5개입니다. impactScore는 -10~10 사이 숫자. potentialGrowth는 향후 1개월 예상 변동률(%). 모든 내용은 반드시 한국어로 작성하세요.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
  const data = await res.json();
  const text = data.content?.[0]?.text;
  if(!text) throw new Error('빈 응답');
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

/* ─── DONUT CHART ─── */
function polar(cx,cy,r,deg){
  const rad=(deg-90)*Math.PI/180;
  return {x:cx+r*Math.cos(rad), y:cy+r*Math.sin(rad)};
}
function DonutChart({ assets }) {
  const SIZE=176, CX=88, CY=88, R=76, INNER=48, GAP=2.5;
  const total=assets.reduce((s,a)=>s+a.currentPrice*a.quantity,0);

  const groups={};
  assets.forEach(a=>{ const v=a.currentPrice*a.quantity; groups[a.type]=(groups[a.type]||0)+v; });
  const segments=Object.entries(groups).map(([type,val])=>({
    type, val, pct:total>0?val/total:0, color:CATEGORY_COLORS[type]||'#ccc'
  })).filter(s=>s.pct>0);

  if(!segments.length) return (
    <div style={{width:SIZE,height:SIZE,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={SIZE} height={SIZE}>
        <circle cx={CX} cy={CY} r={(R+INNER)/2} fill="none" stroke="#E5E7EB" strokeWidth={R-INNER}/>
        <text x={CX} y={CY+5} textAnchor="middle" fontSize="12" fill={C.t3} fontWeight="500">자산 없음</text>
      </svg>
    </div>
  );

  let paths=[];
  if(segments.length===1){
    paths=[<circle key="0" cx={CX} cy={CY} r={(R+INNER)/2} fill="none" stroke={segments[0].color} strokeWidth={R-INNER}/>];
  } else {
    let angle=-90;
    paths=segments.map((s,i)=>{
      const sweep=s.pct*360-GAP;
      if(sweep<=0)return null;
      const la=sweep>180?1:0;
      const s1=polar(CX,CY,R,angle+GAP/2);
      const e1=polar(CX,CY,R,angle+sweep+GAP/2);
      const s2=polar(CX,CY,INNER,angle+sweep+GAP/2);
      const e2=polar(CX,CY,INNER,angle+GAP/2);
      const d=`M${s1.x.toFixed(2)} ${s1.y.toFixed(2)} A${R} ${R} 0 ${la} 1 ${e1.x.toFixed(2)} ${e1.y.toFixed(2)} L${s2.x.toFixed(2)} ${s2.y.toFixed(2)} A${INNER} ${INNER} 0 ${la} 0 ${e2.x.toFixed(2)} ${e2.y.toFixed(2)} Z`;
      angle+=s.pct*360;
      return <path key={i} d={d} fill={s.color}/>;
    });
  }

  const label = total>=100000000
    ? (total/100000000).toFixed(1)+'억'
    : (total/10000).toFixed(0)+'만';

  return (
    <div style={{display:'flex',alignItems:'center',gap:20}}>
      <div style={{position:'relative',flexShrink:0}}>
        <svg width={SIZE} height={SIZE}>
          {paths}
          <text x={CX} y={CY-9} textAnchor="middle" fontSize="10" fill={C.t3} fontWeight="600" letterSpacing=".04em">총 자산</text>
          <text x={CX} y={CY+14} textAnchor="middle" fontSize="18" fill={C.t1} fontWeight="900">{label}</text>
        </svg>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:11}}>
        {segments.map(s=>(
          <div key={s.type} style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
            <span style={{fontSize:13,color:C.t2,fontWeight:500,flex:1}}>{CATEGORY_LABEL[s.type]||s.type}</span>
            <span className="num" style={{fontSize:13,fontWeight:700,color:C.t1}}>{(s.pct*100).toFixed(1)}%</span>
          </div>
        ))}
        {total>0&&(
          <div style={{marginTop:2,paddingTop:10,borderTop:'1px solid #F0F1F6'}}>
            <span className="num" style={{fontSize:13,fontWeight:700,color:C.t1}}>{fmtW(total)}</span>
          </div>
        )}
      </div>
    </div>
  );
}

          <IcShield s={15} cls=""/>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:6,letterSpacing:'.02em'}}>리스크 시뮬레이션</div>
            <p style={{fontSize:12,color:'#7F1D1D',lineHeight:1.75,margin:0}}>{analysis.riskAssessment}</p>
          </div>
        </div>
      </div>

      <button onClick={onAnalyze}
        style={{padding:'14px',borderRadius:14,background:'#F3F4F6',border:'none',color:C.t2,fontWeight:700,fontSize:13,cursor:'pointer'}}>
        재분석
      </button>
    </div>
  );
}

/* ─── CONFIRM DIALOG ─── */
function ConfirmDialog({ message, onConfirm, onCancel }) {
  return (
    <div className="overlay-bg" style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.5)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
      <div className="sheet" style={{background:'#fff',borderRadius:24,padding:28,width:'100%',maxWidth:320,boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
        <p style={{fontSize:15,fontWeight:600,color:C.t1,lineHeight:1.65,margin:'0 0 24px',textAlign:'center'}}>{message}</p>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel}
            style={{flex:1,padding:'13px',borderRadius:14,background:'#F3F4F6',border:'none',fontWeight:700,fontSize:14,color:C.t2,cursor:'pointer'}}>
            취소
          </button>
          <button onClick={onConfirm}
            style={{flex:1,padding:'13px',borderRadius:14,background:C.red,border:'none',fontWeight:700,fontSize:14,color:'#fff',cursor:'pointer',boxShadow:`0 6px 18px ${C.red}44`}}>
            초기화
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('si_key')||'');
  const [assets,setAssets]=useState(()=>{try{return JSON.parse(localStorage.getItem('si_assets')||'[]');}catch{return [];}});
  const [analysis,setAna]=useState(null);
  const [loading,setLoad]=useState(false);
  const [tab,setTab]=useState('home');
  const [showAdd,setAdd]=useState(false);
  const [showReset,setShowReset]=useState(false);
  const [error,setError]=useState('');

  useEffect(()=>{if(apiKey)localStorage.setItem('si_key',apiKey);},[apiKey]);
  useEffect(()=>{localStorage.setItem('si_assets',JSON.stringify(assets));},[assets]);

  const stats=useMemo(()=>{
    const inv=assets.reduce((s,a)=>s+a.purchasePrice*a.quantity,0);
    const cur=assets.reduce((s,a)=>s+a.currentPrice*a.quantity,0);
    return{totalInvestment:inv,currentValue:cur,totalGainLoss:cur-inv,percentageGainLoss:inv>0?(cur-inv)/inv*100:0};
  },[assets]);

  const doAnalyze=useCallback(async()=>{
    if(!assets.length){setError('자산을 먼저 추가해주세요.');return;}
    setError('');setLoad(true);
    try{const r=await analyzePortfolio(assets,apiKey);setAna(r);}
    catch(e){setError('분석 실패: '+e.message);}
    finally{setLoad(false);}
  },[assets,apiKey]);

  if(!apiKey) return <ApiKeySetup onSave={k=>{localStorage.setItem('si_key',k);setApiKey(k);}}/>;

  const NAV=[
    {id:'home',label:'홈',     icon:on=><IcHome s={22} cls={on?'tab-ic-on':'tab-ic-off'}/>},
    {id:'news',label:'뉴스',    icon:on=><IcNews s={22} cls={on?'tab-ic-on':'tab-ic-off'}/>},
    {id:'ai',  label:'AI 분석', icon:on=><IcBrain s={22} cls={on?'tab-ic-on':'tab-ic-off'}/>},
  ];

  return (
    <div className="app">
      {/* 헤더 — frosted glass */}
      <div style={{position:'sticky',top:0,zIndex:50,
        background:'rgba(255,255,255,.88)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
        borderBottom:'1px solid rgba(243,244,246,.8)',
        padding:'0 16px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between',
        boxShadow:'0 1px 16px rgba(0,0,0,.06)'}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:32,height:32,borderRadius:11,background:`linear-gradient(135deg,${C.purple},${C.purpleDark})`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',boxShadow:'0 4px 12px rgba(108,92,231,.35)'}}>
            <IcBrain s={16} cls=""/>
          </div>
          <span style={{fontSize:17,fontWeight:900,color:C.t1,letterSpacing:'-.02em'}}>SmartInvest</span>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setAdd(true)} aria-label="자산 추가"
            style={{width:44,height:44,borderRadius:13,background:C.purpleL,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.purple}}>
            <IcPlus s={18} cls=""/>
          </button>
          <button onClick={()=>setShowReset(true)} aria-label="설정"
            style={{width:44,height:44,borderRadius:13,background:'#F3F4F6',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:C.t3}}>
            <IcSet s={17} cls=""/>
          </button>
        </div>
      </div>

      {/* 콘텐츠 */}
      <div className="scroll-area">
        {tab==='home'&&<HomeTab assets={assets} stats={stats} onAdd={()=>setAdd(true)} onRemove={id=>setAssets(assets.filter(a=>a.id!==id))}/>}
        {tab==='news'&&<NewsTab analysis={analysis} loading={loading} onAnalyze={doAnalyze} error={error} onDismissError={()=>setError('')}/>}
        {tab==='ai'  &&<AnalysisTab analysis={analysis} loading={loading} onAnalyze={doAnalyze} error={error} onDismissError={()=>setError('')}/>}
      </div>

      {/* 하단 탭 바 */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:390,
        background:'rgba(255,255,255,.92)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
        borderTop:'1px solid #F0F1F6',display:'flex',alignItems:'center',height:64,
        boxShadow:'0 -4px 24px rgba(0,0,0,.06)',zIndex:50,
        paddingBottom:'env(safe-area-inset-bottom)'}}>
        {NAV.map(n=>{
          const active=tab===n.id;
          return (
            <button key={n.id} onClick={()=>setTab(n.id)} aria-label={n.label} aria-current={active?'page':undefined}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                padding:'6px 0',background:'none',border:'none',cursor:'pointer'}}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,
                padding:'6px 16px',borderRadius:12,
                background:active?C.purpleL:'transparent',
                transition:'background .18s cubic-bezier(.4,0,.2,1)'}}>
                {n.icon(active)}
                <span style={{fontSize:10,fontWeight:active?700:500,color:active?C.purple:C.t3,transition:'color .18s'}}>
                  {n.label}
                </span>
              </div>
            </button>
          );
        })}
      </div>

      {showAdd&&<AddAssetModal onClose={()=>setAdd(false)} onAdd={a=>{setAssets([...assets,a]);setAdd(false);}}/>}
      {showReset&&(
        <ConfirmDialog
          message="API 키를 초기화할까요? 저장된 키가 삭제됩니다."
          onConfirm={()=>{localStorage.removeItem('si_key');setApiKey('');setShowReset(false);}}
          onCancel={()=>setShowReset(false)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
