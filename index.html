<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liu Yuning Color Tarot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  background:#0a0a0a;
  overflow-x:hidden;
}
#bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:url('images/bg.jpg');
  background-size:cover;
  background-position:center top;
  opacity:0.35;
  z-index:0;
}
#app{
  position:relative;z-index:1;
  padding:2rem 1.25rem;
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
}
.subtitle{
  font-size:11px;font-weight:500;letter-spacing:0.2em;
  color:rgba(255,255,255,0.4);text-align:center;
  text-transform:uppercase;margin-bottom:0.5rem;
}
.title{
  font-size:20px;font-weight:400;color:rgba(255,255,255,0.9);
  text-align:center;margin-bottom:0.25rem;letter-spacing:0.04em;
  line-height:1.5;
}
.divider{
  width:32px;height:1px;
  background:rgba(255,255,255,0.2);
  margin:0.75rem auto 1.5rem;
}
#step-label{
  font-size:13px;color:rgba(255,255,255,0.5);
  text-align:center;margin-bottom:1.25rem;
}
#step-label strong{color:rgba(255,255,255,0.8);font-weight:500}
#cards-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:10px;margin-bottom:1.25rem;
}
.card{
  border-radius:10px;aspect-ratio:2/3;cursor:pointer;
  border:2px solid transparent;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:transform 0.13s ease,box-shadow 0.13s ease;
}
.card.pressing{transform:scale(1.07);box-shadow:0 10px 28px rgba(0,0,0,0.5)}
.card.selected{
  border:2.5px solid rgba(255,255,255,0.9);
  box-shadow:0 0 0 3px rgba(255,255,255,0.2),0 6px 20px rgba(0,0,0,0.4);
}
#select-btn{
  display:none;width:100%;padding:0.85rem;
  font-size:12px;font-weight:500;letter-spacing:0.12em;
  border-radius:8px;
  background:rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.9);
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;margin-top:0.25rem;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:background 0.2s;
}
#select-btn:disabled{
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.25);
  border-color:rgba(255,255,255,0.08);
  cursor:default;
}
#select-btn:not(:disabled):active{background:rgba(255,255,255,0.2)}
#step2{display:none;margin-top:0.5rem}
#final-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:8px;margin-bottom:1rem;
}
.final-card{
  border-radius:8px;aspect-ratio:2/3;cursor:pointer;
  border:2px solid transparent;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:transform 0.13s ease,box-shadow 0.13s ease;
}
.final-card.pressing{transform:scale(1.1);box-shadow:0 10px 28px rgba(0,0,0,0.5)}

/* 카드 플립 */
.flip-container{
  display:none;
  margin-top:1.5rem;
  perspective:1000px;
}
.flip-card{
  width:100%;
  max-width:280px;
  margin:0 auto;
  aspect-ratio:2/3;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.7s ease;
  border-radius:16px;
}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{
  position:absolute;width:100%;height:100%;
  border-radius:16px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.flip-front{
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,255,255,0.5);
  letter-spacing:0.1em;
}
.flip-back{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;
}
.flip-back img{
  width:100%;height:65%;
  object-fit:contain;
  object-position:top center;
  background:#000;
}
.flip-back .result-info{
  flex:1;
  padding:1rem 1.25rem;
  display:flex;flex-direction:column;justify-content:center;
}
.result-color-name{
  font-size:10px;font-weight:500;letter-spacing:0.2em;
  text-transform:uppercase;margin-bottom:0.4rem;opacity:0.6;
}
.result-keywords{
  font-size:11px;margin-bottom:0.75rem;opacity:0.5;letter-spacing:0.03em;
}
.result-divider{width:20px;height:1px;margin-bottom:0.75rem;opacity:0.3}
.result-msg{
  font-size:15px;font-weight:500;line-height:1.7;letter-spacing:0.01em;
}
#restart{
  display:none;width:100%;padding:0.65rem;
  font-size:12px;font-weight:500;letter-spacing:0.08em;
  color:rgba(255,255,255,0.35);
  background:transparent;
  border:0.5px solid rgba(255,255,255,0.15);
  border-radius:8px;cursor:pointer;margin-top:1.25rem;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
</style>
</head>
<body>
<div id="bg"></div>
<div id="app">
  <div class="subtitle">Liu Yuning · Color Tarot</div>
  <div class="title">오늘 어떤 하루가<br>당신을 기다릴까요?</div>
  <div class="divider"></div>
  <div id="step-label">마음에 끌리는 색을 <strong>5장</strong> 골라주세요</div>
  <div id="cards-grid"></div>
  <button id="select-btn" disabled>다음 단계로</button>
  <div id="step2">
    <div id="step-label2" style="font-size:13px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:1.25rem;">
      이 중에서 오늘의 색을 <strong style="color:rgba(255,255,255,0.8);font-weight:500">하나</strong> 고르세요
    </div>
    <div id="final-grid"></div>
  </div>
  <div class="flip-container" id="flip-container">
    <div class="flip-card" id="flip-card">
      <div class="flip-front" id="flip-front"></div>
      <div class="flip-back" id="flip-back">
        <img id="result-img" src="" alt="">
        <div class="result-info" id="result-info">
          <div class="result-color-name" id="result-color-name"></div>
          <div class="result-keywords" id="result-keywords"></div>
          <div class="result-divider" id="result-divider"></div>
          <div class="result-msg" id="result-msg"></div>
        </div>
      </div>
    </div>
  </div>
  <button id="restart">↺ 다시 뽑기</button>
</div>
<script>
const COLORS=[
  {name:"RED",hex:"#B5392A",img:"images/red.jpg",keywords:"열정 · 추진력 · 긴장",msg:"움직이고 싶은 마음이 이미 답을 알고 있어요."},
  {name:"ORANGE",hex:"#D4621E",img:"images/orange.jpg",keywords:"활력 · 사교성 · 창의",msg:"오늘의 에너지는 연결에서 옵니다."},
  {name:"YELLOW",hex:"#D4A017",img:"images/yellow.jpg",keywords:"지성 · 호기심 · 낙관",msg:"질문하는 사람이 가장 멀리 가요."},
  {name:"GREEN",hex:"#3A7D44",img:"images/green.jpg",keywords:"균형 · 성장 · 안정",msg:"서두르지 않아도 잘 하고 있어요."},
  {name:"BLUE",hex:"#2B6CB0",img:"images/blue.jpg",keywords:"신뢰 · 차분함 · 소통",msg:"말하지 않은 것 안에 오늘의 실마리가 있어요."},
  {name:"TURQUOISE",hex:"#2A9D8F",img:"images/turquoise.jpg",keywords:"조화 · 치유 · 평화",msg:"지금 이 자리에서 충분히 쉬어도 괜찮아요."},
  {name:"PURPLE",hex:"#6B3FA0",img:"images/purple.jpg",keywords:"신비 · 창조 · 영감",msg:"아직 이름 붙이지 못한 가능성이 있어요."},
  {name:"PINK",hex:"#C2637A",img:"images/pink.jpg",keywords:"온화함 · 배려 · 감수성",msg:"나를 먼저 돌보는 것이 오늘의 출발점이에요."},
  {name:"BROWN",hex:"#7D5A3C",img:"images/brown.jpg",keywords:"안정 · 현실감 · 신중함",msg:"기초가 단단한 사람은 흔들려도 돌아와요."},
  {name:"WHITE",hex:"#EEECE6",img:"images/white.jpg",keywords:"순수 · 새로운 시작 · 여백",msg:"비워야 채울 수 있어요. 오늘은 여백의 날이에요."},
  {name:"GRAY",hex:"#8A8C85",img:"images/gray.jpg",keywords:"중립 · 사색 · 과도기",msg:"지금은 답이 아니라 방향을 찾는 시간이에요."},
  {name:"BLACK",hex:"#2A2A28",img:"images/black.jpg",keywords:"집중 · 경계 · 내면의 힘",msg:"모든 걸 끌어안을 준비가 된 사람의 색이에요."}
];

let selected=[],shuffled=[];

function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5)}
function getTextColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000>145?"#1a1a1a":"#f5f5f0";
}

function addListeners(el,onTap){
  el.addEventListener('pointerdown',()=>el.classList.add('pressing'));
  el.addEventListener('pointerup',()=>{el.classList.remove('pressing');onTap()});
  el.addEventListener('pointercancel',()=>el.classList.remove('pressing'));
}

function init(){
  selected=[];shuffled=shuffle(COLORS);
  document.getElementById('step2').style.display='none';
  document.getElementById('flip-container').style.display='none';
  document.getElementById('restart').style.display='none';
  document.getElementById('flip-card').classList.remove('flipped');
  const btn=document.getElementById('select-btn');
  btn.style.display='none';btn.disabled=true;
  document.getElementById('step-label').style.display='block';
  const grid=document.getElementById('cards-grid');
  grid.innerHTML='';grid.style.display='grid';
  shuffled.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='card';
    el.style.background=c.hex;
    if(c.hex==='#EEECE6')el.style.border='1.5px solid rgba(255,255,255,0.3)';
    addListeners(el,()=>toggleCard(i,el));
    grid.appendChild(el);
  });
}

function toggleCard(i,el){
  if(selected.includes(i)){selected=selected.filter(x=>x!==i);el.classList.remove('selected')}
  else{if(selected.length>=5)return;selected.push(i);el.classList.add('selected')}
  const btn=document.getElementById('select-btn');
  btn.style.display='block';btn.disabled=selected.length!==5;
}

document.getElementById('select-btn').addEventListener('click',()=>{
  document.getElementById('cards-grid').style.display='none';
  document.getElementById('step-label').style.display='none';
  document.getElementById('select-btn').style.display='none';
  document.getElementById('step2').style.display='block';
  const fg=document.getElementById('final-grid');
  fg.innerHTML='';
  selected.forEach(i=>{
    const c=shuffled[i];
    const el=document.createElement('div');
    el.className='final-card';
    el.style.background=c.hex;
    if(c.hex==='#EEECE6')el.style.border='1.5px solid rgba(255,255,255,0.3)';
    addListeners(el,()=>showResult(c));
    fg.appendChild(el);
  });
});

function showResult(c){
  document.getElementById('step2').style.display='none';
  const tc=getTextColor(c.hex);
  const fc=document.getElementById('flip-container');
  const flipFront=document.getElementById('flip-front');
  const flipCard=document.getElementById('flip-card');
  const resultInfo=document.getElementById('result-info');

  flipFront.style.background=c.hex;
  flipFront.textContent='';
  resultInfo.style.background=c.hex;
  document.getElementById('result-img').src=c.img;
  document.getElementById('result-color-name').textContent=c.name;
  document.getElementById('result-color-name').style.color=tc;
  document.getElementById('result-keywords').textContent=c.keywords;
  document.getElementById('result-keywords').style.color=tc;
  document.getElementById('result-divider').style.background=tc;
  document.getElementById('result-msg').textContent=c.msg;
  document.getElementById('result-msg').style.color=tc;

  fc.style.display='block';
  setTimeout(()=>flipCard.classList.add('flipped'),100);
  document.getElementById('restart').style.display='block';
}

document.getElementById('restart').addEventListener('click',init);
init();
</script>
</body>
</html>
